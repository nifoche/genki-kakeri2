<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掛け率計算機</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>掛け率計算機</h1>

    <div class="input-group">
      <label for="listPrice">定価（円）</label>
      <input
        type="number"
        id="listPrice"
        class="short-input"
        placeholder="例: 10000"
        min="0"
        step="1"
      >
    </div>

    <div class="input-group">
      <label for="discountRate">掛け率</label>
      <select id="discountRate" class="select-input">
        <option value="">選択してください</option>
        <option value="0.17">17%</option>
        <option value="0.18">18%</option>
        <option value="0.20">20%</option>
        <option value="0.25">25%</option>
        <option value="0.35">35%</option>
      </select>
    </div>

    <div class="input-group">
      <label for="sellingRate">販売価格率（%）</label>
      <select id="sellingRate" class="select-input">
        <option value="">選択してください</option>
        <option value="plus5">掛け率+5%</option>
        <option value="plus10">掛け率+10%</option>
        <option value="70">70%</option>
        <option value="80">80%</option>
      </select>
    </div>

    <div class="button-group">
      <button id="calculateBtn" class="btn-primary">計算</button>
      <button id="resetBtn" class="btn-secondary">リセット</button>
    </div>

    <div class="result" id="result" style="display: none;">
      <h2>計算結果</h2>
      <div class="result-item">
        <span class="result-label">基準価格:</span>
        <span class="result-value" id="basePrice">-</span>
      </div>
      <div class="result-item">
        <span class="result-label">販売価格:</span>
        <span class="result-value highlight" id="sellingPrice">-</span>
      </div>
    </div>

    <div class="saved-settings">
      <h3>保存された設定</h3>
      <button id="saveSettingsBtn" class="btn-small">現在の値を保存</button>
      <button id="loadSettingsBtn" class="btn-small">保存した値を読み込み</button>
      <button id="clearSettingsBtn" class="btn-small btn-danger">設定をクリア</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
